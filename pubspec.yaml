name: xodos
description: XoDos Ultra AI - The Ultimate Futuristic Workstation.
publish_to: 'none'
version: 2.0.0+20260414

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core Features
  file_picker: ^8.1.2
  xterm: ^4.0.0
  audioplayers: ^5.2.1
  record: ^5.2.1
  flutter_pty: ^0.4.2
  path_provider: ^2.1.5
  webview_flutter: ^4.13.0
  permission_handler: ^12.0.1
  http: ^1.5.0
  retry: ^3.1.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  clipboard: ^2.0.2
  wakelock_plus: ^1.3.2
  dynamic_color: ^1.8.1
  network_info_plus: ^6.1.4
  device_info_plus: ^11.5.0
  connectivity_plus: ^5.0.1
  intl: ^0.19.0
  uuid: ^4.0.0

  # Local Path Dependencies
  x11_flutter:
    path: ./x11_flutter
  avnc_flutter:
    path: ./avnc_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/
    - assets/scripts/
    - images/icon.png
