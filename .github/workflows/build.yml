name: Build XoDos-Ultra-AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout repo
      # ----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ----------------------------
      # Setup Java (required for Android builds)
      # ----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ----------------------------
      # Install system dependencies
      # ----------------------------
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget git

      # ----------------------------
      # Setup Flutter SDK (OFFICIAL WAY)
      # ----------------------------
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      # ----------------------------
      # Verify Flutter setup
      # ----------------------------
      - name: Verify Flutter
        run: |
          flutter --version
          flutter doctor -v

      # ----------------------------
      # Get dependencies
      # ----------------------------
      - name: Install dependencies
        run: flutter pub get

      # ----------------------------
      # Clean project (safe before build)
      # ----------------------------
      - name: Clean project
        run: flutter clean

      # ----------------------------
      # Analyze (non-blocking)
      # ----------------------------
      - name: Analyze project
        run: flutter analyze || true

      # ----------------------------
      # Build APK (ARM64 only)
      # ----------------------------
      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      # ----------------------------
      # Upload APK artifact
      # ----------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
